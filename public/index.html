<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MirrorFire</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
      padding: 1.5rem;
    }
    h1 { font-size: 1.5rem; text-align: center; margin-bottom: 0.3rem; }
    .sub { color: #888; font-size: 0.85rem; text-align: center; margin-bottom: 1.5rem; }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 1rem;
      margin-bottom: 1rem;
    }
    .card-title {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.95rem; font-weight: 600; margin-bottom: 0.6rem;
    }
    .badge {
      width: 24px; height: 24px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.75rem; font-weight: 700; flex-shrink: 0;
      background: #333; color: #888;
    }
    .badge.active { background: #4a9eff; color: #fff; }
    .badge.done { background: #4caf50; color: #fff; }

    .btn {
      display: block; width: 100%; padding: 0.85rem;
      font-size: 0.95rem; border: none; border-radius: 10px;
      color: #fff; cursor: pointer; text-align: center;
      transition: opacity 0.2s;
    }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-blue { background: #4a9eff; }
    .btn-green { background: #4caf50; }
    .btn-red { background: #f44336; }

    .tv-list { list-style: none; margin: 0.5rem 0 0; }
    .tv-item {
      padding: 0.7rem; background: #222; border-radius: 8px;
      margin-bottom: 0.4rem; cursor: pointer;
      border: 2px solid transparent; transition: border-color 0.2s;
    }
    .tv-item:hover { border-color: #4a9eff; }
    .tv-item.selected { border-color: #4caf50; background: #1a2e1a; }
    .tv-name { font-weight: 600; font-size: 0.9rem; }
    .tv-detail { color: #888; font-size: 0.75rem; }

    .status { font-size: 0.85rem; color: #aaa; margin-top: 0.5rem; text-align: center; }
    .status.ok { color: #4caf50; }
    .status.err { color: #f44336; }

    .spinner {
      display: inline-block; width: 16px; height: 16px;
      border: 2px solid #555; border-top-color: #4a9eff;
      border-radius: 50%; animation: spin 0.7s linear infinite;
      vertical-align: middle; margin-right: 0.4rem;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #preview {
      width: 100%; max-width: 360px; border-radius: 8px;
      display: none; margin: 0.8rem auto 0;
    }
    .hidden { display: none !important; }
  </style>
</head>
<body>

  <h1>MirrorFire</h1>
  <p class="sub">Stream your screen to your TV — no app needed on TV</p>

  <!-- Step 1: Find TV -->
  <div class="card" id="card1">
    <div class="card-title"><span class="badge active" id="b1">1</span> Find your TV</div>
    <button class="btn btn-blue" id="scan-btn" onclick="scanForTVs()">Scan for TVs</button>
    <div id="tv-results"></div>
  </div>

  <!-- Step 2: Cast -->
  <div class="card" id="card2" style="opacity:0.4">
    <div class="card-title"><span class="badge" id="b2">2</span> Cast your screen</div>
    <button class="btn btn-green" id="cast-btn" onclick="startCast()" disabled>Start Casting</button>
    <button class="btn btn-red hidden" id="stop-btn" onclick="stopCast()">Stop Casting</button>
    <div class="status" id="cast-status"></div>
  </div>

  <video id="preview" muted playsinline></video>

<script>
  let selectedTV = null;
  let ws = null;
  let mediaRecorder = null;
  let localStream = null;

  // --- Step 1: Scan ---

  async function scanForTVs() {
    const btn = document.getElementById('scan-btn');
    btn.innerHTML = '<span class="spinner"></span>Scanning...';
    btn.disabled = true;

    try {
      const res = await fetch('/api/discover-tvs');
      const data = await res.json();
      const div = document.getElementById('tv-results');

      if (data.tvs.length === 0) {
        div.innerHTML = `
          <p style="color:#f44336;margin:0.6rem 0 0.3rem">No TVs found.</p>
          <p style="color:#888;font-size:0.8rem">Make sure your TV is on and on the same Wi-Fi.</p>`;
        btn.textContent = 'Try Again';
        btn.disabled = false;
        return;
      }

      let html = '<ul class="tv-list">';
      data.tvs.forEach((tv, i) => {
        html += `<li class="tv-item" onclick="pickTV(this, ${i})" data-idx="${i}">
          <div class="tv-name">${tv.name}</div>
          <div class="tv-detail">${tv.ip}${tv.model ? ' · ' + tv.model : ''}${tv.isSamsung ? ' · Samsung' : ''}</div>
        </li>`;
      });
      html += '</ul>';
      div.innerHTML = html;

      // Store TV data globally
      window._tvs = data.tvs;
      btn.classList.add('hidden');
    } catch (err) {
      document.getElementById('tv-results').innerHTML =
        `<p style="color:#f44336;margin-top:0.5rem">${err.message}</p>`;
    }
    btn.disabled = false;
    btn.textContent = 'Scan for TVs';
  }

  function pickTV(el, idx) {
    document.querySelectorAll('.tv-item').forEach(e => e.classList.remove('selected'));
    el.classList.add('selected');
    selectedTV = window._tvs[idx];

    document.getElementById('b1').className = 'badge done';
    document.getElementById('b1').textContent = '\u2713';
    document.getElementById('b2').className = 'badge active';
    document.getElementById('card2').style.opacity = '1';
    document.getElementById('cast-btn').disabled = false;
  }

  // --- Step 2: Cast ---

  async function startCast() {
    const btn = document.getElementById('cast-btn');
    btn.innerHTML = '<span class="spinner"></span>Starting...';
    btn.disabled = true;
    setCastStatus('');

    try {
      // 1. Check browser support
      if (!navigator.mediaDevices || !navigator.mediaDevices.getDisplayMedia) {
        throw new Error(
          'Screen capture not supported on this browser. ' +
          'Make sure you are using Chrome on your phone and accessing via HTTPS.'
        );
      }

      // 2. Capture screen
      localStream = await navigator.mediaDevices.getDisplayMedia({
        video: true,
        audio: true
      });

      // Show preview
      const preview = document.getElementById('preview');
      preview.srcObject = localStream;
      preview.style.display = 'block';
      preview.play();

      // Stop if user ends share from system UI
      localStream.getVideoTracks()[0].onended = () => stopCast();

      // 2. Determine best codec
      const mimeType = pickMimeType();
      console.log('Using codec:', mimeType);

      // 3. Connect WebSocket for streaming chunks
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(`${proto}://${location.host}`);

      ws.onopen = () => {
        ws.send(JSON.stringify({ type: 'register-sender' }));
      };

      ws.onmessage = (e) => {
        try {
          const msg = JSON.parse(e.data);
          if (msg.type === 'tv-receiving') {
            setCastStatus('TV is receiving your stream!', 'ok');
          } else if (msg.type === 'tv-disconnected') {
            setCastStatus('TV stopped receiving', 'err');
          }
        } catch {}
      };

      await new Promise((resolve, reject) => {
        ws.onopen = () => {
          ws.send(JSON.stringify({ type: 'register-sender' }));
          resolve();
        };
        ws.onerror = reject;
        setTimeout(reject, 5000);
      });

      // 4. Start MediaRecorder and send chunks
      mediaRecorder = new MediaRecorder(localStream, {
        mimeType,
        videoBitsPerSecond: 2500000
      });

      mediaRecorder.ondataavailable = async (e) => {
        if (e.data.size > 0 && ws && ws.readyState === 1) {
          const buffer = await e.data.arrayBuffer();
          ws.send(buffer);
        }
      };

      mediaRecorder.start(500); // chunk every 500ms

      // 5. Tell TV to play the stream via DLNA
      setCastStatus('Sending to TV...', '');

      const castRes = await fetch('/api/start-cast', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          controlUrl: selectedTV.controlUrl,
          mimeType: mimeType.split(';')[0] // just the base mime
        })
      });
      const castData = await castRes.json();

      if (castData.success) {
        setCastStatus('Casting to TV...', 'ok');
        document.getElementById('b2').className = 'badge done';
        document.getElementById('b2').textContent = '\u2713';
        btn.classList.add('hidden');
        document.getElementById('stop-btn').classList.remove('hidden');
      } else {
        setCastStatus('Error: ' + (castData.error || 'Failed'), 'err');
        stopCast();
      }

    } catch (err) {
      console.error(err);
      setCastStatus('Error: ' + err.message, 'err');
      btn.disabled = false;
      btn.textContent = 'Start Casting';
      if (localStream) {
        localStream.getTracks().forEach(t => t.stop());
        localStream = null;
      }
    }
  }

  async function stopCast() {
    if (mediaRecorder && mediaRecorder.state !== 'inactive') {
      mediaRecorder.stop();
    }
    mediaRecorder = null;

    if (localStream) {
      localStream.getTracks().forEach(t => t.stop());
      localStream = null;
    }

    if (ws) {
      ws.close();
      ws = null;
    }

    try { await fetch('/api/stop-cast', { method: 'POST' }); } catch {}

    document.getElementById('preview').style.display = 'none';
    document.getElementById('stop-btn').classList.add('hidden');
    const btn = document.getElementById('cast-btn');
    btn.classList.remove('hidden');
    btn.disabled = false;
    btn.textContent = 'Start Casting';
    document.getElementById('b2').className = 'badge active';
    document.getElementById('b2').textContent = '2';
    setCastStatus('Stopped.', '');
  }

  function setCastStatus(text, cls) {
    const el = document.getElementById('cast-status');
    el.textContent = text;
    el.className = 'status' + (cls ? ' ' + cls : '');
  }

  function pickMimeType() {
    // Prefer MP4 (H.264) for best TV compatibility, fall back to WebM
    const candidates = [
      'video/mp4;codecs=avc1,mp4a.40.2',
      'video/mp4;codecs=avc1',
      'video/webm;codecs=vp8,opus',
      'video/webm;codecs=vp9,opus',
      'video/webm;codecs=vp8',
      'video/webm'
    ];
    for (const mime of candidates) {
      if (MediaRecorder.isTypeSupported(mime)) return mime;
    }
    return 'video/webm';
  }
</script>
</body>
</html>
