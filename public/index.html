<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MirrorFire</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>MirrorFire</h1>
  <p class="sub">Stream your screen to your TV — no app needed on TV</p>

  <!-- Step 1: Find TV -->
  <div class="card" id="card1">
    <div class="card-title">
      <span class="badge active" id="b1">1</span> Find your TV
    </div>
    <button class="btn btn-blue" id="scan-btn" onclick="scanForTVs()">Scan for TVs</button>
    <div id="tv-results"></div>
  </div>

  <!-- Step 2: Cast -->
  <div class="card" id="card2" style="opacity:0.4">
    <div class="card-title">
      <span class="badge" id="b2">2</span> Cast your screen
    </div>
    <button class="btn btn-green" id="cast-btn" onclick="startCast()" disabled>Start Casting</button>
    <button class="btn btn-red hidden" id="stop-btn" onclick="stopCast()">Stop Casting</button>
    <div class="status" id="cast-status"></div>
  </div>

  <video id="preview" muted playsinline></video>

  <script src="app.js"></script>
</body>
</html>
